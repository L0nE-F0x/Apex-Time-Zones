ShortDescription: System-tray world clock with a 3D globe and verified sports schedules in your timezone.
Description: >-
  ApexTimeZones is a Windows system-tray world clock built around a real 3D
  Earth. Pin cities, convert event times across zones, and follow 12 sports
  (F1, World Cup, UFC, WSL surfing, MotoGP, NFL, tennis, golf, cycling,
  cricket, rugby, marathons) with venue and local times, countdowns,
  reminders, and calendar export. Sports schedules update over the air.
