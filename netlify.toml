# Netlify: connect this GitHub repo and deploy the marketing site.
# Site settings → Build & deploy → Publish directory: website
# (This file sets it automatically.)

[build]
  publish = "website"
  # No build command — static HTML + portable EXE in /downloads

[[headers]]
  for = "/downloads/*"
  [headers.values]
    Content-Type = "application/octet-stream"
    Content-Disposition = "attachment"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/updates/*"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=60"

[[headers]]
  for = "/data/*"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/download"
  to = "https://github.com/L0nE-F0x/Apex-Time-Zones/releases/latest/download/ApexTimeZones-Portable.exe"
  status = 302

# Binary now lives on GitHub Releases; keep every old link working.
[[redirects]]
  from = "/downloads/ApexTimeZones-Portable.exe"
  to = "https://github.com/L0nE-F0x/Apex-Time-Zones/releases/latest/download/ApexTimeZones-Portable.exe"
  status = 302
